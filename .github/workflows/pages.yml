name: Deploy site (companion + docs) to Pages

# Single Pages deployment serving BOTH from the GitHub-Actions source:
#   companion (examples/window_explorer.html)  -> https://marekwadinger.github.io/reshift/
#   mkdocs docs                                -> https://marekwadinger.github.io/reshift/docs/
# actions/configure-pages flips the repo Pages source to "GitHub Actions" on the
# first run (replacing the old gh-pages branch deploy), so no Settings change is
# needed. This workflow supersedes the separate docs.yml gh-deploy.
on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'publications/ECC26/**'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Bump version"] # redeploy docs after a release bump
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # workflow_run fires on any completion; only rebuild after a successful bump
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0 # mkdocs revision-date plugins need full history

      # Same cargo cache as ci.yml: river's Rust extension is built by `uv sync`.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('vendor/river/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      # Switches the repo Pages source to GitHub Actions if not already.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Companion sits at the site ROOT (index.html + data/ + plotly.min.js).
      - name: Build companion into _site
        run: uv run python examples/build_companion.py _site

      # The paper PDF is a LaTeX build artifact (gitignored): compile from source
      # and stage it next to the companion as paper.pdf (the in-page link target).
      # Best-effort: a LaTeX hiccup must not blackhole the whole Pages deploy, so
      # the compile is non-fatal and staging is guarded (the in-page link 404s).
      - name: Compile the paper
        id: paper
        continue-on-error: true
        uses: xu-cheng/latex-action@v4
        with:
          root_file: root.tex
          working_directory: publications/ECC26

      - name: Stage paper into _site
        run: |
          if [ -f publications/ECC26/root.pdf ]; then
            cp publications/ECC26/root.pdf _site/paper.pdf
          else
            echo "::warning::paper.pdf not built; the in-page link will 404"
          fi

      # mkdocs docs go under /docs (site_url in mkdocs.yml matches).
      - name: Build docs into _site/docs
        run: uv run mkdocs build --site-dir _site/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
