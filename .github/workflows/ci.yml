name: Code Quality and Tests

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'pyproject.toml'
      - 'CHANGELOG.md'
      - '.github/workflows/**'
  workflow_dispatch:
  pull_request:
    branches: [ main, dev ]
    # Skip the heavy test matrix for docs-only changes. Safe here because
    # main has no required status checks, so a skipped run never blocks merge.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.14"]

    # Build river's two Rust extensions into one dir we can cache. uv rebuilds
    # editable path deps every run, so without this cargo recompiles MKL + all
    # crate deps from scratch on each job/OS.
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust-target

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Cache Rust build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ github.workspace }}/rust-target
        key: ${{ runner.os }}-cargo-${{ hashFiles('vendor/river/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Test with pytest
      run: uv run pytest --cov --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      # Skip on Dependabot/fork PRs: they have no access to secrets, so the
      # token is empty and the upload can't run. PR gating is done by codecov's
      # status checks, not by this step — so never fail CI on an upload hiccup.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && github.actor != 'dependabot[bot]'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Minimize uv cache
      run: uv cache prune --ci

  lint:
    runs-on: ubuntu-latest

    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust-target

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Cache Rust build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ github.workspace }}/rust-target
        key: ${{ runner.os }}-cargo-${{ hashFiles('vendor/river/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync

    - name: Lint with ruff
      run: uv run ruff check .

    - name: Type check with ty
      run: uv run ty check

    - name: Minimize uv cache
      run: uv cache prune --ci
