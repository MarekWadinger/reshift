# https://pre-commit.com
exclude: ^vendor/  # vendored third-party source — not ours to lint/check
default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg
  - post-checkout
  - post-merge
  - post-rewrite
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements #Check for debugger imports and breakpoint() in python files
        stages: [pre-commit]
      - id: check-ast #Simply check whether files parse as valid python
        stages: [pre-commit]
      - id: fix-byte-order-marker #removes UTF-8 byte order marker
        stages: [pre-commit]
      - id: check-json
        exclude: tsconfig.*\.json$
        stages: [pre-commit]
      - id: detect-private-key # detect-private-key is not in repo
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        args: ["--maxkb=10000"]
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: check-case-conflict #Check for files with names that would conflict on a case-insensitive filesystem like MacOS HFS+ or Windows FAT
        stages: [pre-commit]
      - id: end-of-file-fixer #Makes sure files end in a newline and only a newline
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "v0.49.0"
    hooks:
      - id: markdownlint
        args: ["-f", "--disable", "MD051", "--disable", "MD013"]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        language: system
        types: [python]
        entry: make test
        pass_filenames: false
        always_run: false
        stages: [pre-push]
  - repo: https://github.com/roy-ht/pre-commit-jupyter
    rev: v1.2.1
    hooks:
      - id: jupyter-notebook-cleanup
        args:
          - --remove-kernel-metadata
          - --pin-patterns
          - "[pin];[donotremove]"
        stages: [pre-push]
  - repo: local
    hooks:
      - id: commitizen
        name: commitizen
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true
  - repo: https://github.com/MarekWadinger/doc-checks
    rev: v0.4.0
    hooks:
      - id: doc-check-make-refs
        stages: [pre-commit]
      - id: doc-check-cd-refs
        stages: [pre-commit]
      - id: doc-check-py-imports
        stages: [pre-commit]
      - id: doc-check-trees
        stages: [pre-commit]
      - id: doc-check-env-vars
        stages: [pre-commit]
      - id: doc-check-endpoints
        stages: [pre-commit]
      - id: doc-check-mermaid
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.22
    hooks:
      - id: uv-sync
        args: ["--frozen"]
