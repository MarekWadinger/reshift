<!doctype html>
<meta charset="utf-8">
<title>Window influence on CPD score</title>
<!-- Explore how ref/test/lag windows turn a reconstruction-residual profile into the
     SubIDChangeDetector score:  score = max(D_test/D_train - 1, 0)
     with D_train = mean(residual over ref window), D_test = mean(residual over test window).
     See reshift/chdsubid.py (distances / score properties). Single file, no build.

     The clean (noise-free) residual gives the ground truth: where it is *changing* is the
     true change region, which lets us score the threshold with FAR / MAR and a detection
     delay measured to the peak of the statistic.

     Plant mode (needs plant_residual_server.py) can run several DMD identifiers at once;
     each model keeps one colour across every plot and the metric tabs. -->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; margin: 16px; color: #222; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #666; margin: 0 0 14px; }
  .panels { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; align-items: flex-start; }
  .panel { border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #888; margin: 0 0 8px; }
  .ctl { display: flex; flex-direction: column; margin-bottom: 8px; }
  .ctl label { font-weight: 600; font-size: 12px; }
  .ctl .val { color: #c0392b; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 200px; }
  select { padding: 4px; font: inherit; }
  .mlist label { display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; }
  .swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }
  .metrics { display: flex; gap: 16px; }
  .metric { text-align: center; min-width: 64px; }
  .metric .num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .metric .lbl { font-size: 11px; color: #888; }
  .ok { color: #27ae60; } .bad { color: #c0392b; }
  .tabbar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .tab { padding: 3px 9px; border: 1px solid #ccc; border-bottom: 3px solid; border-radius: 5px 5px 0 0;
         background: #fafafa; font: inherit; font-size: 12px; cursor: pointer; }
  .tab.active { background: #fff; font-weight: 700; }
  .tabcontent { border: 2px solid #ccc; border-radius: 0 8px 8px 8px; padding: 10px 12px; min-height: 56px; }
  code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; }
</style>

<h1>Window influence on the change-detection score</h1>
<p class="sub">
  <code>score = max(D_test/D_train − 1, 0)</code>. Hover the lower plot to slide the ref/test windows.
  Gray dashed = known onset; per-model dotted line = that model's score peak (= detection delay).
</p>

<div class="panels">
  <div class="panel">
    <h2>Residual source</h2>
    <div class="ctl"><label>source</label>
      <select id="source">
        <option value="plant" selected>two-tank plant + DMD</option>
        <option value="synthetic">synthetic profile</option>
      </select>
    </div>
    <div class="ctl"><label>DMD identifiers (plant mode)</label>
      <div class="mlist" id="mlist"></div>
    </div>
    <div class="ctl"><span id="status" style="font-size:11px;color:#888"></span></div>
  </div>

  <div class="panel">
    <h2>Signal / change</h2>
    <div class="ctl"><label>type</label>
      <select id="type">
        <option value="permanent">permanent (stays changed)</option>
        <option value="transient">transient (returns to baseline)</option>
      </select>
    </div>
    <div class="ctl"><label>transition width — fast ↔ slow <span class="val" id="v_width"></span></label><input id="width" type="range" min="1" max="120" value="6"></div>
    <div class="ctl"><label>noise <span class="val" id="v_noise"></span></label><input id="noise" type="range" min="0" max="60" value="8"></div>
  </div>

  <div class="panel">
    <h2>Windows</h2>
    <div class="ctl"><label>ref_size <span class="val" id="v_ref"></span></label><input id="ref" type="range" min="5" max="200" value="60"></div>
    <div class="ctl"><label>test_size <span class="val" id="v_test"></span></label><input id="test" type="range" min="5" max="200" value="60"></div>
    <div class="ctl"><label>lag <span class="val" id="v_lag"></span></label><input id="lag" type="range" min="0" max="100" value="0"></div>
  </div>

  <div class="panel">
    <h2>Detection</h2>
    <div class="ctl"><label>threshold <span class="val" id="v_thr"></span></label><input id="thr" type="range" min="0" max="300" value="25"></div>
    <div class="tabbar" id="tabbar"></div>
    <div class="tabcontent" id="tabcontent"></div>
  </div>
</div>

<div id="plot_top" style="width:100%;display:none"></div>
<div id="plot" style="width:100%;height:480px"></div>

<script>
const N = 600, BASE = 1.0, CENTER = 300, HI = 4.0;
const METHODS = ['DMD', 'tDMD', 'DMDc', 'onlineDMD', 'onlineDMDc', 'toDMDc'];
const COLOR = {DMD:'#1f77b4', tDMD:'#ff7f0e', DMDc:'#2ca02c', onlineDMD:'#d62728', onlineDMDc:'#9467bd', toDMDc:'#8c564b', synthetic:'#1f77b4'};
const THRESH = '#111';   // threshold colour, deliberately unlike any model colour
const PLANT = '#999';    // plant (ground-truth) state colour

// Deterministic LCG so the synthetic picture is stable across slider drags.
function rng(seed){ let s = seed >>> 0; return () => (s = (1103515245*s + 12345) & 0x7fffffff) / 0x7fffffff; }

// Synthetic residual. width = transition width (small=sharp/fast, large=smooth/slow).
function profile(type, width, noise){
  const clean = new Array(N), r = new Array(N), rand = rng(42);
  for (let t = 0; t < N; t++){
    let v = BASE;
    if (type === 'permanent'){
      if (width <= 1) v = t >= CENTER ? HI : BASE;
      else { const u = Math.min(1, Math.max(0, (t-CENTER)/width)); v = BASE + (HI-BASE)*(u*u*(3-2*u)); }
    } else {
      v = BASE + (HI-BASE)*Math.exp(-((t-CENTER)**2)/(2*width*width));
    }
    clean[t] = v;
    r[t] = Math.max(0, v + (rand()-0.5)*2*noise);
  }
  return { clean, r };
}

const mean = (a, lo, hi) => { let s = 0; for (let i = lo; i < hi; i++) s += a[i]; return s/(hi-lo); };

// score[t] aligned so the combined window's right edge is at t (buffer layout in chdsubid.py).
function scores(r, ref, test, lag){
  const L = ref + lag + test, out = new Array(r.length).fill(null);
  for (let t = L-1; t < r.length; t++){
    const start = t - L + 1;
    out[t] = Math.max(mean(r, t-test+1, t+1) / mean(r, start, start+ref) - 1, 0);
  }
  return out;
}

function bands(t, ref, test, lag){
  const L = ref + lag + test, start = t - L + 1;
  return { ok: start >= 0, ref: [start, start+ref], test: [t-test+1, t+1] };
}

// Ground truth from the clean signal: the change region is where it is *changing*,
// extended by the buffer length L so the change can traverse both windows.
function metrics(sc, clean, ref, test, lag, thr){
  const Nn = clean.length, L = ref + lag + test;
  const dEPS = 0.005*(Math.max(...clean) - Math.min(...clean) || 1);
  let cs = -1, ce = -1;
  for (let t = 1; t < Nn; t++) if (Math.abs(clean[t]-clean[t-1]) > dEPS){ if (cs < 0) cs = t; ce = t; }
  const posS = cs < 0 ? 0 : cs, posE = Math.min(Nn-1, (ce < 0 ? 0 : ce) + L);
  let fp = 0, nrm = 0, fn = 0, pos = 0, peak = -1, peakIdx = -1;
  for (let t = 0; t < Nn; t++){
    const s = sc[t]; if (s === null) continue;
    if (t >= posS && t <= posE){ pos++; if (s <= thr) fn++; if (s > peak){ peak = s; peakIdx = t; } }
    else { nrm++; if (s > thr) fp++; }
  }
  return {
    far: nrm ? fp/nrm : 0, mar: pos ? fn/pos : 0, marEvent: (peak > thr) ? 0 : 1,
    delay: peakIdx >= 0 ? peakIdx - posS : null, detected: peak > thr, onset: posS, peakIdx,
  };
}

const $ = id => document.getElementById(id);
const signalIds = ['source','type','width','noise'];   // change the residual(s)
const windowIds = ['ref','test','lag','thr'];           // only re-window/score
let tcur = 380, staticShapes = [], series = [], activeTab = null;

// Build the coloured method checklist (also serves as the legend). Set `checked`
// as a property — the attribute via innerHTML does not reliably apply.
METHODS.forEach(m => {
  const lab = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'mchk'; cb.value = m; cb.checked = (m === 'onlineDMDc');
  lab.append(cb);
  lab.insertAdjacentHTML('beforeend', `<span class="swatch" style="background:${COLOR[m]}"></span>${m}`);
  $('mlist').appendChild(lab);
});
const selectedMethods = () => [...document.querySelectorAll('.mchk:checked')].map(c => c.value);

// Acquire residual(s): synthetic profile (one series) or N plant+DMD series (server).
async function refreshResidual(){
  const type = $('type').value, width = +$('width').value, noise = +$('noise').value/100;
  if ($('source').value === 'synthetic'){
    const { clean, r } = profile(type, width, noise);
    series = [{ key:'synthetic', color:COLOR.synthetic, clean, r }];
    $('status').textContent = 'synthetic profile';
  } else {
    const methods = selectedMethods();
    if (!methods.length){ series = []; $('status').textContent = 'pick at least one identifier'; drawTop(); draw(); return; }
    $('status').textContent = `running ${methods.join(', ')} on two-tank…`;
    const got = await Promise.all(methods.map(m => {
      const q = new URLSearchParams({method:m, change:type, width, noise});
      return fetch('/residual?' + q).then(res => res.ok ? res.json() : Promise.reject()).then(d => ({...d, key:m})).catch(() => null);
    }));
    series = got.filter(Boolean).map(d => ({ key:d.key, color:COLOR[d.key], clean:d.clean, r:d.r, states:d.states, pred:d.pred, inputs:d.inputs }));
    $('status').textContent = series.length ? `${series.map(s=>s.key).join(', ')} · two-tank` : 'plant unavailable — run plant_residual_server.py';
  }
  drawTop();
  draw();
}

// Build evenly-stacked y-axes (top→bottom) for an n-row figure.
function stacked(titles){
  const n = titles.length, gap = 0.07, h = (1 - gap*(n-1))/n, ax = {};
  titles.forEach((title, i) => {
    const top = 1 - i*(h+gap);
    ax[i ? 'yaxis'+(i+1) : 'yaxis'] = { domain:[Math.max(0, top-h), top], title:{text:title, font:{size:11}} };
  });
  ax.xaxis = { anchor: n>1 ? 'y'+n : 'y' };
  return ax;
}

// Upper screen: one subplot per state (plant gray solid, each model dashed in its
// colour), then the input. Plant mode only.
function drawTop(){
  const div = $('plot_top');
  const withStates = series.filter(s => s.states);
  if (!withStates.length){ div.style.display = 'none'; return; }
  const st = withStates[0].states, nst = st.length, len = st[0].length;
  const x = [...Array(len).keys()];
  div.style.display = 'block';
  div.style.height = (150*nst + 130) + 'px';
  const traces = [];
  for (let i = 0; i < nst; i++){
    const ax = i ? 'y'+(i+1) : 'y';
    traces.push({ x, y: st[i], name:'plant', legendgroup:'plant', showlegend:i===0, yaxis:ax, line:{color:PLANT, width:2} });
    for (const s of withStates)
      traces.push({ x, y: s.pred[i], name:s.key, legendgroup:s.key, showlegend:i===0, yaxis:ax, line:{color:s.color, width:1.2, dash:'dash'} });
  }
  traces.push({ x, y: withStates[0].inputs, name:'input q', legendgroup:'input', yaxis:'y'+(nst+1), line:{color:'#777'} });
  const titles = [...Array(nst).keys()].map(i => `h${i+1}`); titles.push('input q');
  const onset = {type:'line', xref:'x', yref:'paper', x0:CENTER, x1:CENTER, y0:0, y1:1, line:{color:PLANT,width:1,dash:'dash'}};
  Plotly.react('plot_top', traces, {
    margin:{t:24,r:20,b:34,l:55}, shapes:[onset], legend:{orientation:'h', y:1.08}, ...stacked(titles),
  }, {displayModeBar:false});
}

function bandShapes(){
  const b = bands(tcur, +$('ref').value, +$('test').value, +$('lag').value);
  if (!b.ok) return [];
  return [
    {type:'rect', xref:'x', yref:'paper', x0:b.ref[0],  x1:b.ref[1],  y0:0, y1:1, fillcolor:'#3498db', opacity:0.13, line:{width:0}},
    {type:'rect', xref:'x', yref:'paper', x0:b.test[0], x1:b.test[1], y0:0, y1:1, fillcolor:'#2ecc71', opacity:0.16, line:{width:0}}];
}

// Lower screen: residual + score per model (model colour), one threshold (THRESH),
// per-model delay lines (model colour). Metrics go to the coloured tabs.
function draw(){
  const width = +$('width').value, noise = +$('noise').value/100;
  const ref = +$('ref').value, test = +$('test').value, lag = +$('lag').value, thr = +$('thr').value/100;
  for (const [k,v] of [['width',width],['noise',noise.toFixed(2)],['ref',ref],['test',test],['lag',lag],['thr',thr.toFixed(2)]])
    $('v_'+k).textContent = v;
  if (!series.length){ Plotly.react('plot', [], {}); renderTabs([]); return; }

  const N = series[0].r.length, x = [...Array(N).keys()];
  const traces = [], delayShapes = [], tabData = [];
  let onset = 0;
  for (const s of series){
    const sc = scores(s.r, ref, test, lag);
    const m = metrics(sc, s.clean, ref, test, lag, thr);
    onset = m.onset;
    traces.push({ x, y: s.r, name:s.key, legendgroup:s.key, yaxis:'y', line:{color:s.color} });
    traces.push({ x, y: sc, name:s.key, legendgroup:s.key, showlegend:false, yaxis:'y2', line:{color:s.color} });
    if (m.peakIdx >= 0)
      delayShapes.push({type:'line', xref:'x', yref:'paper', x0:m.peakIdx, x1:m.peakIdx, y0:0, y1:0.42, line:{color:s.color, width:1.5, dash:'dot'}});
    tabData.push({ key:s.key, color:s.color, m });
  }
  renderTabs(tabData);

  staticShapes = [
    {type:'line', xref:'x', yref:'paper', x0:onset, x1:onset, y0:0, y1:1, line:{color:PLANT,width:1,dash:'dash'}},
    ...delayShapes,
  ];
  const layout = {
    margin:{t:30,r:20,b:40,l:55}, legend:{orientation:'h', y:1.12},
    shapes: staticShapes.concat(bandShapes()),
    xaxis:{title:'time', anchor:'y2'},
    yaxis:{domain:[0.52,1], title:'residual'},
    yaxis2:{domain:[0,0.42], title:'score', rangemode:'tozero'},
  };
  // one threshold line across the score axis, in a colour unlike any model
  traces.push({ x:[0,N-1], y:[thr,thr], name:'threshold', yaxis:'y2', line:{color:THRESH, dash:'dash'}, hoverinfo:'skip' });
  Plotly.react('plot', traces, layout, {displayModeBar:false});
}

// Coloured metric sub-tabs; the content box is bordered in the active model's colour.
function renderTabs(tabData){
  const bar = $('tabbar'), content = $('tabcontent');
  bar.innerHTML = '';
  if (!tabData.length){ content.innerHTML = ''; content.style.borderColor = '#ccc'; return; }
  if (!tabData.find(t => t.key === activeTab)) activeTab = tabData[0].key;
  for (const t of tabData){
    const b = document.createElement('button');
    b.className = 'tab' + (t.key === activeTab ? ' active' : '');
    b.style.borderBottomColor = t.color;
    b.textContent = t.key;
    if (t.key === activeTab) b.style.color = t.color;
    b.onclick = () => { activeTab = t.key; renderTabs(tabData); };
    bar.appendChild(b);
  }
  const t = tabData.find(x => x.key === activeTab), m = t.m;
  content.style.borderColor = t.color;
  const cell = (num, lbl) => `<div class="metric"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`;
  content.innerHTML = `<div class="metrics">
    ${cell(m.delay === null ? '–' : m.delay, 'delay→peak')}
    ${cell(`<span class="${m.detected?'ok':'bad'}">${m.detected?'✓':'✗'}</span>`, 'detected')}
    ${cell((m.far*100).toFixed(1)+'%', 'FAR')}
    ${cell((m.mar*100).toFixed(1)+'%', 'MAR/sample')}
    ${cell(`<span class="${m.marEvent?'bad':'ok'}">${m.marEvent*100}%</span>`, 'MAR/event')}
  </div>`;
}

signalIds.forEach(id => $(id).addEventListener('input', refreshResidual));
windowIds.forEach(id => $(id).addEventListener('input', draw));
document.querySelectorAll('.mchk').forEach(c => c.addEventListener('input', refreshResidual));
refreshResidual();

// Hover the lower plot to slide the shaded ref/test windows (cheap relayout).
$('plot').on('plotly_hover', e => {
  const t = Math.round(e.points[0].x);
  if (t !== tcur){ tcur = t; Plotly.relayout('plot', {shapes: staticShapes.concat(bandShapes())}); }
});

// self-checks: flat residual scores 0; a step is detected with non-negative delay.
(() => {
  const flat = new Array(N).fill(2.0);
  console.assert(scores(flat, 30, 30, 0).filter(v => v!==null).every(v => v === 0), 'flat residual should score 0');
  const { clean, r } = profile('permanent', 1, 0);
  const m = metrics(scores(r, 60, 60, 0), clean, 60, 60, 0, 0.25);
  console.assert(m.detected && m.delay >= 0, 'step should be detected with delay >= 0');
})();
</script>
