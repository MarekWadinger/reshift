<!doctype html>
<meta charset="utf-8">
<title>Window influence on CPD score</title>
<!-- Explore how ref/test/lag windows turn a reconstruction-residual profile into the
     SubIDChangeDetector score:  score = max(D_test/D_train - 1, 0)
     with D_train = mean(residual over ref window), D_test = mean(residual over test window).
     See reshift/chdsubid.py (distances / score properties). Single file, no build.

     The clean (noise-free) residual gives the ground truth: where it is *changing* is the
     true change region, which lets us score the threshold with FAR / MAR and a detection
     delay measured to the peak of the statistic.

     Plant mode (needs plant_residual_server.py) can run several DMD identifiers at once;
     each model keeps one colour across every plot and the metric tabs. -->
<!-- Vendored plotly (v2.35.2) so the page works fully offline. Served by
     plant_residual_server.py, or sits next to the HTML for file:// use. -->
<script src="plotly.min.js"></script>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; margin: 16px; color: #222; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #666; margin: 0 0 14px; }
  .app { display: flex; gap: 16px; align-items: flex-start; }
  .sidebar { display: flex; flex-direction: column; gap: 12px; width: 290px; flex: 0 0 290px; }
  .main { flex: 1; min-width: 0; }
  .panel { border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #888; margin: 0 0 8px; }
  .ctl { display: flex; flex-direction: column; margin-bottom: 8px; }
  .ctl label { font-weight: 600; font-size: 12px; }
  .ctl .val { color: #c0392b; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 200px; }
  select { padding: 4px; font: inherit; }
  .mlist label { display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; margin-bottom: 2px; }
  .mlist .mname { flex: 1; }
  .mlist .mstyle { font-size: 12px; padding: 1px 2px; min-width: 64px; letter-spacing: -1px; }
  .swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; flex: 0 0 auto; }
  .metrics { display: flex; gap: 16px; }
  .metric { text-align: center; min-width: 64px; }
  .metric .num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .metric .lbl { font-size: 11px; color: #888; }
  .ok { color: #27ae60; } .bad { color: #c0392b; }
  #mtable { overflow-x: auto; }
  table.mt { border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
  table.mt th, table.mt td { padding: 3px 6px; text-align: right; border-bottom: 1px solid #eee; }
  table.mt th { color: #888; font-weight: 600; }
  table.mt td.mname { text-align: left; font-weight: 600; white-space: nowrap; }
  table.mt td.best { font-weight: 700; background: #eafaf0; border-radius: 3px; }
  .panel button { font: inherit; font-size: 12px; padding: 5px 8px; margin: 2px 0; cursor: pointer;
                  border: 1px solid #ccc; border-radius: 5px; background: #fafafa; display: block; width: 100%; text-align: left; }
  .panel button:hover { background: #eef; }
  code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; }
</style>

<h1>Window influence on the change-detection score</h1>
<p class="sub">
  <code>score = max(D_test/D_train − 1, 0)</code>. Hover the lower plot to slide the ref/test windows.
  Gray dashed = known onset; per-model dotted line = that model's score peak (= detection delay).
</p>

<div class="app">
<div class="sidebar">
  <div class="panel">
    <h2>Residual source</h2>
    <div class="ctl"><label>source</label>
      <select id="source">
        <option value="plant" selected>two-tank plant + DMD</option>
        <option value="synthetic">synthetic profile</option>
      </select>
    </div>
    <div class="ctl"><label>DMD identifiers (plant mode)</label>
      <div class="mlist" id="mlist"></div>
    </div>
  </div>

  <div class="panel">
    <h2>Signal / change</h2>
    <div class="ctl"><label>type</label>
      <select id="type">
        <option value="permanent">permanent (stays changed)</option>
        <option value="transient">transient (returns to baseline)</option>
      </select>
    </div>
    <div class="ctl"><label>transition width — fast ↔ slow <span class="val" id="v_width"></span></label><input id="width" type="range" min="1" max="120" value="6"></div>
    <div class="ctl"><label>noise <span class="val" id="v_noise"></span></label><input id="noise" type="range" min="0" max="60" value="8"></div>
  </div>

  <div class="panel">
    <h2>Windows</h2>
    <div class="ctl"><label>ref_size <span class="val" id="v_ref"></span></label><input id="ref" type="range" min="5" max="200" value="60"></div>
    <div class="ctl"><label>test_size <span class="val" id="v_test"></span></label><input id="test" type="range" min="5" max="200" value="60"></div>
    <div class="ctl"><label>lag <span class="val" id="v_lag"></span></label><input id="lag" type="range" min="0" max="100" value="0"></div>
  </div>

  <div class="panel">
    <h2>Detection</h2>
    <div class="ctl"><label>threshold <span class="val" id="v_thr"></span></label><input id="thr" type="range" min="0" max="300" value="25"></div>
    <div id="mtable"></div>
  </div>

  <div class="panel">
    <h2>Export</h2>
    <button id="dlpng">⬇ figure (PNG)</button>
    <button id="dlsvg">⬇ figure (SVG, vector)</button>
    <button id="dljson">⬇ results + data (JSON)</button>
  </div>
</div>
<div class="main">
  <div id="plot" style="width:100%;height:480px"></div>
</div>
</div>

<script>
const N = 600, BASE = 1.0, CENTER = 300, HI = 4.0;
const METHODS = ['DMD', 'tDMD', 'DMDc', 'onlineDMD', 'onlineDMDc', 'toDMDc'];
const COLOR = {DMD:'#1f77b4', tDMD:'#ff7f0e', DMDc:'#2ca02c', onlineDMD:'#d62728', onlineDMDc:'#9467bd', toDMDc:'#8c564b', synthetic:'#1f77b4'};
const DASHES = ['solid', 'dot', 'dash', 'longdash', 'dashdot', 'longdashdot'];
const GLYPH = { solid:'━━━━', dot:'∙∙∙∙∙∙∙', dash:'┅┅┅┅', longdash:'━ ━ ━', dashdot:'━·━·━', longdashdot:'━━·━━·' };
const DEFAULT_DASH = {DMD:'solid', tDMD:'dot', DMDc:'dash', onlineDMD:'longdash', onlineDMDc:'dashdot', toDMDc:'longdashdot', synthetic:'solid'};
const THRESH = '#111';   // threshold colour, deliberately unlike any model colour
const PLANT = '#999';    // plant (ground-truth) state colour

// Deterministic LCG so the synthetic picture is stable across slider drags.
function rng(seed){ let s = seed >>> 0; return () => (s = (1103515245*s + 12345) & 0x7fffffff) / 0x7fffffff; }

// Synthetic residual. width = transition width (small=sharp/fast, large=smooth/slow).
function profile(type, width, noise){
  const clean = new Array(N), r = new Array(N), rand = rng(42);
  for (let t = 0; t < N; t++){
    let v = BASE;
    if (type === 'permanent'){
      if (width <= 1) v = t >= CENTER ? HI : BASE;
      else { const u = Math.min(1, Math.max(0, (t-CENTER)/width)); v = BASE + (HI-BASE)*(u*u*(3-2*u)); }
    } else {
      v = BASE + (HI-BASE)*Math.exp(-((t-CENTER)**2)/(2*width*width));
    }
    clean[t] = v;
    r[t] = Math.max(0, v + (rand()-0.5)*2*noise);
  }
  return { clean, r };
}

const mean = (a, lo, hi) => { let s = 0; for (let i = lo; i < hi; i++) s += a[i]; return s/(hi-lo); };

// score[t] aligned so the combined window's right edge is at t (buffer layout in chdsubid.py).
function scores(r, ref, test, lag){
  const L = ref + lag + test, out = new Array(r.length).fill(null);
  for (let t = L-1; t < r.length; t++){
    const start = t - L + 1;
    out[t] = Math.max(mean(r, t-test+1, t+1) / mean(r, start, start+ref) - 1, 0);
  }
  return out;
}

function bands(t, ref, test, lag){
  const L = ref + lag + test, start = t - L + 1;
  return { ok: start >= 0, ref: [start, start+ref], test: [t-test+1, t+1] };
}

// Ground truth from the clean signal: the change region is where it is *changing*,
// extended by the buffer length L so the change can traverse both windows.
function metrics(sc, clean, ref, test, lag, thr){
  const Nn = clean.length, L = ref + lag + test;
  const dEPS = 0.005*(Math.max(...clean) - Math.min(...clean) || 1);
  let cs = -1, ce = -1;
  for (let t = 1; t < Nn; t++) if (Math.abs(clean[t]-clean[t-1]) > dEPS){ if (cs < 0) cs = t; ce = t; }
  const posS = cs < 0 ? 0 : cs, posE = Math.min(Nn-1, (ce < 0 ? 0 : ce) + L);
  let fp = 0, nrm = 0, fn = 0, pos = 0, peak = -1, peakIdx = -1;
  for (let t = 0; t < Nn; t++){
    const s = sc[t]; if (s === null) continue;
    if (t >= posS && t <= posE){ pos++; if (s <= thr) fn++; if (s > peak){ peak = s; peakIdx = t; } }
    else { nrm++; if (s > thr) fp++; }
  }
  return {
    far: nrm ? fp/nrm : 0, mar: pos ? fn/pos : 0, marEvent: (peak > thr) ? 0 : 1,
    delay: peakIdx >= 0 ? peakIdx - posS : null, detected: peak > thr, onset: posS, peakIdx,
  };
}

const $ = id => document.getElementById(id);
const signalIds = ['source','type','width','noise'];   // change the residual(s)
const windowIds = ['ref','test','lag','thr'];           // only re-window/score
let tcur = 380, staticShapes = [], series = [], tcurManual = false;

// Build the coloured method checklist (also serves as the legend). Set `checked`
// as a property — the attribute via innerHTML does not reliably apply.
METHODS.forEach(m => {
  const lab = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'mchk'; cb.value = m; cb.checked = (m === 'toDMDc');
  lab.append(cb);
  const opts = DASHES.map(d => `<option value="${d}"${d===DEFAULT_DASH[m]?' selected':''} title="${d}">${GLYPH[d]}</option>`).join('');
  lab.insertAdjacentHTML('beforeend',
    `<span class="swatch" style="background:${COLOR[m]}"></span><span class="mname">${m}</span>` +
    `<select class="mstyle" data-method="${m}">${opts}</select>`);
  $('mlist').appendChild(lab);
});
const selectedMethods = () => [...document.querySelectorAll('.mchk:checked')].map(c => c.value);
// Line style (Plotly dash) chosen per method; used for every trace of that model.
const dashOf = m => document.querySelector(`.mstyle[data-method="${m}"]`)?.value || 'solid';

// Persist the control setup so a reload keeps your chosen methods/params
// instead of snapping back to the hardcoded defaults.
const STORE = 'cpd_explorer_v2';   // bump to reset stale state to new defaults
const CTRLS = ['source','type','width','noise','ref','test','lag','thr'];
function saveState(){
  try {
    const st = { methods: selectedMethods(), styles: {} };
    for (const id of CTRLS) st[id] = $(id).value;
    document.querySelectorAll('.mstyle').forEach(s => { st.styles[s.dataset.method] = s.value; });
    localStorage.setItem(STORE, JSON.stringify(st));
  } catch (e) { /* storage unavailable */ }
}
function loadState(){
  try {
    const st = JSON.parse(localStorage.getItem(STORE));
    if (!st) return;
    for (const id of CTRLS) if (st[id] != null) $(id).value = st[id];
    if (Array.isArray(st.methods))
      document.querySelectorAll('.mchk').forEach(c => c.checked = st.methods.includes(c.value));
    if (st.styles)
      document.querySelectorAll('.mstyle').forEach(s => { if (st.styles[s.dataset.method]) s.value = st.styles[s.dataset.method]; });
  } catch (e) { /* ignore malformed state */ }
}

// Acquire residual(s): synthetic profile (one series) or N plant+DMD series (server).
async function refreshResidual(){
  tcurManual = false;   // re-anchor windows on the new data's change point
  const type = $('type').value, width = +$('width').value, noise = +$('noise').value/100;
  if ($('source').value === 'synthetic'){
    const { clean, r } = profile(type, width, noise);
    series = [{ key:'synthetic', color:COLOR.synthetic, clean, r }];
  } else {
    const methods = selectedMethods();
    if (!methods.length){ series = []; draw(); return; }
    const got = await Promise.all(methods.map(m => {
      const q = new URLSearchParams({method:m, change:type, width, noise});
      return fetch('/residual?' + q).then(res => res.ok ? res.json() : Promise.reject()).then(d => ({...d, key:m})).catch(() => null);
    }));
    series = got.filter(Boolean).map(d => ({ key:d.key, color:COLOR[d.key], clean:d.clean, r:d.r, states:d.states, pred:d.pred, inputs:d.inputs }));
    // Offline / server down: fall back to the synthetic profile so the page still works.
    if (!series.length){ $('source').value = 'synthetic'; return refreshResidual(); }
  }
  draw();
}

// Evenly-stacked [bottom, top] domains for n rows, top→bottom.
function domains(n){
  const gap = 0.035, h = (1 - gap*(n-1))/n, ds = [];
  for (let i = 0; i < n; i++){ const top = 1 - i*(h+gap); ds.push([Math.max(0, top-h), top]); }
  return ds;
}
const axName = i => i ? 'y'+(i+1) : 'y';

function bandShapes(){
  const b = bands(tcur, +$('ref').value, +$('test').value, +$('lag').value);
  if (!b.ok) return [];
  return [
    {type:'rect', xref:'x', yref:'paper', x0:b.ref[0],  x1:b.ref[1],  y0:0, y1:1, fillcolor:'#3498db', opacity:0.13, line:{width:0}},
    {type:'rect', xref:'x', yref:'paper', x0:b.test[0], x1:b.test[1], y0:0, y1:1, fillcolor:'#2ecc71', opacity:0.16, line:{width:0}}];
}

// Single stacked figure with ONE shared x-axis (so everything lines up and the
// onset is one line across all rows): plant states + input (plant mode only),
// then residual and score per model. Per-model colour throughout; one threshold.
function draw(){
  const width = +$('width').value, noise = +$('noise').value/100;
  const ref = +$('ref').value, test = +$('test').value, lag = +$('lag').value, thr = +$('thr').value/100;
  for (const [k,v] of [['width',width],['noise',noise.toFixed(2)],['ref',ref],['test',test],['lag',lag],['thr',thr.toFixed(2)]])
    $('v_'+k).textContent = v;
  saveState();
  if (!series.length){ Plotly.react('plot', [], {}); renderTable([]); return; }

  const N = series[0].r.length, x = [...Array(N).keys()];
  const plant = !!series[0].states;

  // per-series score + metrics
  const scs = [], tabData = [];
  let onset = 0;
  for (const s of series){
    const sc = scores(s.r, ref, test, lag);
    const m = metrics(sc, s.clean, ref, test, lag, thr);
    onset = m.onset;
    scs.push({ s, sc, m });
    tabData.push({ key:s.key, color:s.color, m });
  }
  renderTable(tabData);
  if (!tcurManual) tcur = Math.min(N-1, Math.max(ref+lag+test-1, onset + lag + test - 1));

  // row layout: [h1..hk, input]? + residual + score
  const nst = plant ? series[0].states.length : 0;
  const titles = [];
  for (let i = 0; i < nst; i++) titles.push(`h${i+1}`);
  if (plant) titles.push('input q');
  titles.push('residual', 'score');
  const n = titles.length, doms = domains(n);

  const traces = [];
  let row = 0;
  if (plant){
    for (let i = 0; i < nst; i++, row++){
      const ax = axName(row);
      traces.push({ x, y: series[0].states[i], name:'plant', legendgroup:'plant', showlegend:i===0, yaxis:ax, line:{color:PLANT, width:2} });
      for (const {s} of scs)
        traces.push({ x, y: s.pred[i], name:s.key, legendgroup:s.key, showlegend:false, yaxis:ax, line:{color:s.color, width:1.2, dash:dashOf(s.key)} });
    }
    // input shares the 'plant' legend entry (one ground-truth entry, not two)
    traces.push({ x, y: series[0].inputs, name:'plant', legendgroup:'plant', showlegend:false, yaxis:axName(row++), line:{color:PLANT} });
  }
  const axR = axName(row++), axS = axName(row++);
  const delayShapes = [];
  for (const {s, sc, m} of scs){
    traces.push({ x, y: s.r, name:s.key, legendgroup:s.key, yaxis:axR, line:{color:s.color, dash:dashOf(s.key)} });
    traces.push({ x, y: sc, name:s.key, legendgroup:s.key, showlegend:false, yaxis:axS, line:{color:s.color, dash:dashOf(s.key)} });
    if (m.peakIdx >= 0)
      delayShapes.push({type:'line', xref:'x', yref:'paper', x0:m.peakIdx, x1:m.peakIdx, y0:doms[n-1][0], y1:doms[n-1][1], line:{color:s.color, width:1.5, dash:'dot'}});
  }
  traces.push({ x:[0,N-1], y:[thr,thr], name:'threshold', yaxis:axS, line:{color:THRESH, dash:'dash'}, hoverinfo:'skip' });

  staticShapes = [
    {type:'line', xref:'x', yref:'paper', x0:onset, x1:onset, y0:0, y1:1, line:{color:PLANT,width:1,dash:'dash'}},
    ...delayShapes,
  ];
  const layout = {
    margin:{t:24,r:20,b:40,l:55}, legend:{orientation:'h', y:1.05},
    shapes: staticShapes.concat(bandShapes()),
    xaxis:{ title:'time', anchor:axName(n-1) },
  };
  titles.forEach((t, i) => {
    layout[i ? 'yaxis'+(i+1) : 'yaxis'] = { domain:doms[i], title:{text:t, font:{size:11}}, ...(t==='score' ? {rangemode:'tozero'} : {}) };
  });
  $('plot').style.height = Math.max(360, 118*n) + 'px';
  Plotly.react('plot', traces, layout, {displayModeBar:false});
}

// Metrics table: one row per model (coloured swatch), best value per column
// highlighted. Lower is better for delay/FAR/MAR; detected best = ✓.
function renderTable(tabData){
  const el = $('mtable');
  if (!tabData.length){ el.innerHTML = ''; return; }
  const ms = tabData.map(t => t.m);
  const bestDelay = Math.min(...ms.map(m => m.delay === null ? Infinity : m.delay));
  const bestFar = Math.min(...ms.map(m => m.far));
  const bestMar = Math.min(...ms.map(m => m.mar));
  const bestMarE = Math.min(...ms.map(m => m.marEvent));
  const td = (val, best) => `<td${best ? ' class="best"' : ''}>${val}</td>`;
  const rows = tabData.map(({key, color, m}) => `<tr>
    <td class="mname"><span class="swatch" style="background:${color}"></span>${key}</td>
    ${td(m.delay === null ? '–' : m.delay, m.delay !== null && m.delay === bestDelay)}
    ${td(`<span class="${m.detected?'ok':'bad'}">${m.detected?'✓':'✗'}</span>`, m.detected)}
    ${td((m.far*100).toFixed(1)+'%', m.far === bestFar)}
    ${td((m.mar*100).toFixed(1)+'%', m.mar === bestMar)}
    ${td(`<span class="${m.marEvent?'bad':'ok'}">${m.marEvent*100}%</span>`, m.marEvent === bestMarE)}
  </tr>`).join('');
  el.innerHTML = `<table class="mt">
    <tr><th>model</th><th>delay</th><th>det</th><th>FAR</th><th>MAR/s</th><th>MAR/e</th></tr>
    ${rows}</table>`;
}

// --- export -----------------------------------------------------------------
// Meaningful filename encoding all the metadata that produced the figure/data.
function fname(){
  const src = $('source').value;
  const who = src === 'synthetic' ? 'synthetic' : (selectedMethods().join('-') || 'none');
  const p = id => $(id).value;
  const noise = (+p('noise')/100).toFixed(2), thr = (+p('thr')/100).toFixed(2);
  return `cpd_${src}_${$('type').value}_w${p('width')}_n${noise}`
       + `_ref${p('ref')}_test${p('test')}_lag${p('lag')}_thr${thr}_${who}`;
}

// Full reproducible export: metadata + per-model metrics + the raw series.
function exportData(){
  const ref = +$('ref').value, test = +$('test').value, lag = +$('lag').value, thr = +$('thr').value/100;
  const meta = { source:$('source').value, change:$('type').value, width:+$('width').value,
                 noise:+$('noise').value/100, ref_size:ref, test_size:test, lag, threshold:thr,
                 n: series[0] ? series[0].r.length : 0 };
  const rows = [], data = [];
  for (const s of series){
    const sc = scores(s.r, ref, test, lag);
    const m = metrics(sc, s.clean, ref, test, lag, thr);
    meta.onset = m.onset;
    rows.push({ model:s.key, delay_to_peak:m.delay, detected:m.detected, FAR:m.far, MAR_sample:m.mar, MAR_event:m.marEvent });
    const d = { model:s.key, residual:s.r, score:sc };
    if (s.states){ d.states = s.states; d.prediction = s.pred; d.input = s.inputs; }
    data.push(d);
  }
  return { metadata: meta, metrics: rows, series: data };
}

function download(blob, ext){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname() + ext;
  a.click();
  URL.revokeObjectURL(a.href);
}
$('dlpng').onclick = () => { if (series.length) Plotly.downloadImage('plot', {format:'png', scale:2, filename:fname()}); };
$('dlsvg').onclick = () => { if (series.length) Plotly.downloadImage('plot', {format:'svg', filename:fname()}); };
$('dljson').onclick = () => { if (series.length) download(new Blob([JSON.stringify(exportData(), null, 2)], {type:'application/json'}), '.json'); };

// Debounce residual refresh so dragging a slider fires one fetch, not dozens.
let debTimer;
const debouncedRefresh = () => { clearTimeout(debTimer); debTimer = setTimeout(refreshResidual, 180); };
signalIds.forEach(id => $(id).addEventListener('input', debouncedRefresh));
windowIds.forEach(id => $(id).addEventListener('input', draw));
document.querySelectorAll('.mchk').forEach(c => c.addEventListener('input', debouncedRefresh));
document.querySelectorAll('.mstyle').forEach(s => s.addEventListener('input', draw));  // restyle, no refetch
loadState();          // restore the last setup before the first render
refreshResidual();

// Hover the lower plot to slide the shaded ref/test windows (cheap relayout).
$('plot').on('plotly_hover', e => {
  const t = Math.round(e.points[0].x);
  if (t !== tcur){ tcurManual = true; tcur = t; Plotly.relayout('plot', {shapes: staticShapes.concat(bandShapes())}); }
});

// self-checks: flat residual scores 0; a step is detected with non-negative delay.
(() => {
  const flat = new Array(N).fill(2.0);
  console.assert(scores(flat, 30, 30, 0).filter(v => v!==null).every(v => v === 0), 'flat residual should score 0');
  const { clean, r } = profile('permanent', 1, 0);
  const m = metrics(scores(r, 60, 60, 0), clean, 60, 60, 0, 0.25);
  console.assert(m.detected && m.delay >= 0, 'step should be detected with delay >= 0');
})();
</script>
